# =============================================================================
#  CAELUS Mobile — XcodeGen project specification
#
#  Generates CAELUSMobile.xcodeproj on macOS:
#
#      cd platforms/ios/App
#      xcodegen generate        # requires: brew install xcodegen
#
#  Prerequisites (run from the repository root, macOS + Xcode 15+):
#      tools/build_ios_core.sh              # → dist/ios/CaelusCore.xcframework
#
#  The project is committed as YAML (not .xcodeproj) so diffs stay
#  reviewable and no generated binary plist churn enters git history.
# =============================================================================
name: CAELUSMobile
options:
  bundleIdPrefix: com.caelus
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # Determinism/audit posture: warnings are errors in release CI builds.
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    CLANG_ENABLE_MODULES: YES

packages:
  CAELUSMobile:
    path: ../CAELUSMobile

targets:
  CAELUSMobileApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
      # Bundled signed packages — folder references so the on-device bundle
      # mirrors the repository layout (scenarios/, models/assurance_v1/).
      - path: ../../../scenarios
        type: folder
        buildPhase: resources
      - path: ../../../models
        type: folder
        buildPhase: resources
    dependencies:
      - package: CAELUSMobile
        product: CAELUSMobileUI
      - package: CAELUSMobile
        product: CAELUSMobileCore
      # Native core: C++ engine + C bridge + Rust staticlib in one
      # XCFramework (build with tools/build_ios_core.sh first).
      - framework: ../../../dist/ios/CaelusCore.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.caelus.mobile
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"          # iPhone + iPad
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: >-
          UIInterfaceOrientationPortrait
          UIInterfaceOrientationPortraitUpsideDown
          UIInterfaceOrientationLandscapeLeft
          UIInterfaceOrientationLandscapeRight
        # Face ID intent confirmation for critical actions.
        INFOPLIST_KEY_NSFaceIDUsageDescription: >-
          CAELUS asks for Face ID to confirm your intent before critical
          actions such as applying high-impact levers or exporting reports.
        # Document browser import of signed packages.
        INFOPLIST_KEY_UISupportsDocumentBrowser: NO
        INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: NO
        # Offline-first: the app performs no networking at all, so ATS
        # exceptions are deliberately absent.
        DEAD_CODE_STRIPPING: YES
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: CAELUS
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false

  CAELUSMobileUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: UITests
    dependencies:
      - target: CAELUSMobileApp

schemes:
  CAELUSMobileApp:
    build:
      targets:
        CAELUSMobileApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CAELUSMobileUITests
      # Package unit tests (EngineController etc.) also run on macOS/Linux;
      # on-device they execute through this scheme.
    archive:
      config: Release
