name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release binaries
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build production binary
        run: CAELUS_PRODUCTION=1 ./build.sh

      - name: Package artifacts with checksums
        run: |
          mkdir -p release
          cp dist/caelus_os "release/caelus_os-linux-x86_64"
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "CAELUS $GITHUB_REF_NAME" \
            --generate-notes
